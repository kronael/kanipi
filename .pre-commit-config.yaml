repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.refs/
      - id: end-of-file-fixer
        exclude: ^\.refs/
      - id: check-yaml
        exclude: ^\.refs/
      - id: check-json
        exclude: ^\.refs/
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(ts|js|json|yaml|yml|md)$
        exclude: ^(\.refs/|package-lock\.json|container/agent-runner/)

  - repo: local
    hooks:
      - id: typecheck
        name: typecheck
        entry: npx tsc --noEmit
        language: system
        pass_filenames: false
        files: \.ts$
        exclude: ^(\.refs/|container/)
      - id: typecheck-agent
        name: typecheck-agent
        entry: bash -c 'cd container/agent-runner && npm install --silent && npx tsc --noEmit'
        language: system
        pass_filenames: false
        files: ^container/agent-runner/.*\.ts$
